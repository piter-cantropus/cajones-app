<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Escanear QR</title>
</head>

<body>

<h1>Escanear QR</h1>

<video id="preview" width="300"></video>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

const scanner = new Html5Qrcode("preview")

scanner.start(
{ facingMode: "environment" },
{ fps: 10, qrbox: 250 },
decodedText => {
window.location.href = decodedText
}
)

</script>

</body>

</html>
